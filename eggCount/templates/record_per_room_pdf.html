<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #f2f2f2;
        }

         .footer {
            margin-top: 40px;
            padding: 30px 10px;
            text-align: center;
            font-size: 15px;
            color: #333;
        }

        .footer p {
            margin: 8px 0;
        }

        .footer a {
            color: #2196F3;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .footer .copyright {
            margin-top: 25px;
            font-size: 13px;
            color: #777;
        }

        .footer_con {
            grid-column: 1 / -1;
            text-align: center;
            margin-top: 10px;
        }

        .footer_con a {
            display: inline-block;
            padding: 8px 18px;
            background: #2196F3;
            color: white;
            border-radius: 25px;
            text-decoration: none;
            font-size: 14px;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        .footer_con a:hover {
            background: #1976D2;
            transform: scale(1.05);
        }
    </style>
</head>

    <body>

    <h2>Egg collection Records</h2>

        <table>
            <tr>
                <th>Date</th>
                <th>Eggs Collected</th>
                <th>Broken eggs</th>
                <th>Period</th>
            </tr>

            {% for x in room_data %}
            <tr>
                <td>{{x.date}} </td>
                <td> {{x.eggsNo}} </td>
                <td> {{x.brokenEggs}} </td>
                <td> {{x.period}} </td>
            </tr>
            {% endfor %}

        </table>

        <footer class="footer">
            

            <p class="copyright">
                &copy; 2026 Mwaniki's Poultry Farm Management System
            </p>
        </footer>

    </body>
</html>
