<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Poultry Room</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 600px;
      margin: 50px auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #333;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    label {
      font-weight: bold;
      color: #555;
    }

    input, select {
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #4CAF50;
    }

    button {
      background: #4CAF50;
      color: #fff;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #43a047;
    }

    .link-box {
      text-align: center;
      margin-top: 20px;
    }

    .link-box a {
      text-decoration: none;
      color: #2196F3;
      font-weight: bold;
    }

    .link-box a:hover {
      text-decoration: underline;
    }

    .footer {
      text-align: center;
      margin-top: 30px;
      color: #888;
      font-size: 13px;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>Register Poultry Room</h1>

    <form action="process_room.php" method="post">

      <div>
        <label for="room_no">Room Number</label>
        <input type="number" id="room_no" name="room_no" placeholder="e.g. 1" required />
      </div>

      <div>
        <label for="capacity">Chicken Capacity</label>
        <input type="number" id="capacity" name="capacity" placeholder="e.g. 500" required />
      </div>

      <div>
        <label for="type">Room Type</label>
        <select id="type" name="type" required>
          <option value="">-- Select Type --</option>
          <option value="Layers">Layers</option>
          <option value="Broilers">Broilers</option>
          <option value="Chicks">Chicks</option>
        </select>
      </div>

      <div>
        <label for="status">Room Status</label>
        <select id="status" name="status" required>
          <option value="Active">Active</option>
          <option value="Inactive">Inactive</option>
        </select>
      </div>

      <div>
        <label for="remarks">Remarks (optional)</label>
        <input type="text" id="remarks" name="remarks" placeholder="Any notes about this room" />
      </div>

      <button type="submit">Register Room</button>
    </form>

    <div class="link-box">
      <p>Already registered rooms?</p>
      <a href="/">Go to egg collection</a>
    </div>

    <div class="link-box">
          <p>See registered room status</p>
          <a href="/records">Room status</a>
      </div>

    <div class="footer">
      &copy; 2026 Mwaniki's Poultry Farm Management System
    </div>
  </div>

</body>
</html>
